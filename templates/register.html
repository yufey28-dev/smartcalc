{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Регистрация</div>

    <form method="POST" action="/register">
      <div class="form-group">
        <label class="form-label">Имя пользователя</label>
        <input class="form-input" type="text" name="username"
          placeholder="Придумайте имя" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" name="password"
          placeholder="Минимум 8 символов, 1 заглавная, 1 цифра" required>
      </div>
      <div style="font-size:12px; color:#888; margin-bottom:12px; line-height:1.5;">
        Требования: минимум 8 символов, одна заглавная буква, одна цифра
      </div>
      <button type="submit" class="auth-btn">Зарегистрироваться</button>
    </form>

    <div class="auth-link">
      Уже есть аккаунт? <a href="/login">Войти</a>
    </div>
  </div>
</div>

{% endblock %}
