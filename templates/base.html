<!DOCTYPE html>
<html>
<head>
    <title>SmartCalc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">SmartCalc</span>

    <div>
        {% if user %}
            <span class="text-white me-3">Привет, {{ user }}</span>
            <a href="/profile" class="btn btn-outline-light btn-sm">Профиль</a>

            {% if user == "admin" %}
                <a href="/admin" class="btn btn-warning btn-sm">Админка</a>
            {% endif %}

            <a href="/logout" class="btn btn-danger btn-sm">Выход</a>
        {% else %}
            <a href="/login" class="btn btn-success btn-sm">Вход</a>
            <a href="/register" class="btn btn-primary btn-sm">Регистрация</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
